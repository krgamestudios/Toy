filetype: toy

detect:
  filename: '\.toy$'

rules:
    # Identifiers.
  - identifier: '\b\w+'
    # Function invocations.
  - identifier.function: '\b\w+\('
    # `print` keyword.
  - statement: '\bprint\b'
    # Declaration keywords.
  - statement.declaration: '\b(fn|class|var)\b'
    # Statements that affect control flow.
  - statement.control: '\b(break|continue|return|yield)\b'
    # Statements.
  - statement: '\b(assert|if|else|while|for|in|of|import|export|as|pass)\b'
    # Types.
  - type: '\b(Bool|Int|Float|String|Function|Opaque|Any)\b'
    # Collection types.
  - type.collections: '\b(Array|Table)\b'
    # `const` keyword.
  - type.keyword: '\bconst\b'
    # Brackets.
  - symbol.bracket: '[()[\\]{}]'
    # Non-operator symbols.
  - symbol: '[=:]'
    # Operators.
  - symbol.operator: '[+\-*/%!<>]=?|\+\+|--|==|[&|?]|\.{1,3}'
    # Separator symbols.
  - symbol.comma: '[,;]'
    # Boolean literals.
  - constant.bool: '\b(true|false)\b'
    # Integer literals.
  - constant.number: '\b\d[\d_]*\b'
    # Floating point literals.
  - constant.number: '\b\d[\d_]*\.\d[\d_]*\b'
    # String literals.
  - constant.string:
      start: '"'
      end: '"|$'
      skip: '\\"'
      rules:
          # Escaped characters.
        - constant.specialChar: '\\[nt"\\]'
    # Single-line comments.
  - comment.line:
      start: '//'
      end: '$'
      rules: []
    # Multi-line comment.
  - comment.block:
      start: '/\*'
      end: '\*/'
      rules: []
